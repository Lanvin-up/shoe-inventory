<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鞋子库存管理系统（Gitee版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e0e5ec 0%, #c9d1da 100%);
            min-height: 100vh; padding: 20px; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center; margin-bottom: 20px; padding: 25px;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border-radius: 16px; color: white; position: relative;
            box-shadow: 0 8px 32px rgba(44, 62, 80, 0.3);
        }
        .header h1 { font-size: 2em; margin-bottom: 5px; letter-spacing: 2px; }
        .header p { opacity: 0.85; font-size: 0.95em; }
        .settings-btn {
            position: absolute; top: 15px; right: 20px;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 15px; border-radius: 20px;
            font-size: 0.9em; cursor: pointer; transition: all 0.3s;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.35); }
        .sync-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 12px;
            font-size: 0.75em; margin-top: 10px;
        }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #27ae60; }
        .sync-dot.error { background: #e74c3c; }
        .sync-dot.waiting { background: #f1c40f; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .stats-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 150px; background: white; padding: 20px;
            border-radius: 12px; text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .stat-card .number {
            font-size: 2em; font-weight: 700;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stat-card .label { font-size: 0.85em; color: #888; margin-top: 5px; }
        .form-panel {
            background: white; border-radius: 16px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .form-panel h2 { font-size: 1.3em; margin-bottom: 20px; color: #2c3e50; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85em; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select {
            padding: 10px 14px; border: 2px solid #e0e5ec; border-radius: 10px;
            font-size: 0.95em; outline: none; background: #f8f9fa;
        }
        .form-group input:focus { border-color: #3498db; background: white; }
        .form-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 10px 24px; border: none; border-radius: 10px; font-size: 0.95em;
            font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-success { background: linear-gradient(135deg, #27ae60, #219a52); color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.82em; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 14px 10px 40px; border: 2px solid #e0e5ec;
            border-radius: 10px; font-size: 0.95em; outline: none; background: white;
        }
        .search-box::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .filter-select { padding: 10px 14px; border: 2px solid #e0e5ec; border-radius: 10px; background: white; }
        .table-container { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .table-container table { width: 100%; border-collapse: collapse; }
        .table-container thead { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; }
        .table-container th { padding: 14px 16px; text-align: left; font-weight: 600; }
        .table-container td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        .main-row { cursor: pointer; }
        .main-row:hover { background: #f8f9fa; }
        .detail-row { background: #fafbfc; }
        .toggle-icon { cursor: pointer; color: #3498db; font-size: 1.2em; }
        .toggle-icon.expanded { transform: rotate(90deg); display: inline-block; }
        .product-id { font-weight: 700; color: #2c3e50; font-family: monospace; }
        .color-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.82em; color: white; }
        .quantity-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; }
        .quantity-high { background: #d4edda; color: #155724; }
        .quantity-medium { background: #fff3cd; color: #856404; }
        .quantity-low { background: #f8d7da; color: #721c24; }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast {
            padding: 12px 20px; border-radius: 10px; color: white; margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); animation: slideIn 0.3s ease;
        }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
        .toast-warning { background: #f39c12; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 30px; max-width: 500px; width: 90%;
        }
        .modal h3 { margin-bottom: 20px; color: #2c3e50; }
        .modal p { color: #666; margin-bottom: 15px; }
        .modal .form-group { margin-bottom: 15px; }
        .modal .form-group input { width: 100%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .help-text { font-size: 0.8em; color: #999; margin-top: 4px; }
        .help-text a { color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👟 鞋子库存管理系统</h1>
            <p>货号自动归类 · Gitee 免费云同步</p>
            <div class="sync-badge">
                <span class="sync-dot" id="syncDot"></span>
                <span id="syncText">仅本地模式</span>
            </div>
            <button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>
        </div>
        <div class="stats-bar">
            <div class="stat-card"><div class="number" id="totalProducts">0</div><div class="label">商品款式</div></div>
            <div class="stat-card"><div class="number" id="totalQuantity">0</div><div class="label">库存总量</div></div>
            <div class="stat-card"><div class="number" id="totalColors">0</div><div class="label">颜色种类</div></div>
            <div class="stat-card"><div class="number" id="lowStock">0</div><div class="label">库存预警</div></div>
        </div>
        <div class="form-panel">
            <h2>📦 添加新商品</h2>
            <div class="form-grid">
                <div class="form-group"><label>货号</label><input type="text" id="productId" placeholder="SN-2024-001"></div>
                <div class="form-group"><label>颜色</label><input type="text" id="productColor" placeholder="黑色/白色/红色..."></div>
                <div class="form-group"><label>尺码</label>
                    <select id="productSize">
                        <option value="">请选择</option>
                        <option value="35">35</option><option value="36">36</option><option value="37">37</option>
                        <option value="38">38</option><option value="39">39</option><option value="40">40</option>
                        <option value="41">41</option><option value="42">42</option><option value="43">43</option>
                        <option value="44">44</option><option value="45">45</option><option value="46">46</option>
                    </select>
                </div>
                <div class="form-group"><label>数量</label><input type="number" id="productQuantity" placeholder="0"></div>
            </div>
            <div class="form-actions">
                <button class="btn btn-success" onclick="addProduct()">➕ 添加</button>
                <button class="btn btn-secondary" onclick="resetForm()">🔄 重置</button>
            </div>
        </div>
        <div class="toolbar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="搜索货号..." oninput="renderTable()"></div>
            <select class="filter-select" id="filterColor" onchange="renderTable()"><option value="">全部颜色</option></select>
            <select class="filter-select" id="filterSize" onchange="renderTable()"><option value="">全部尺码</option></select>
            <button class="btn btn-primary" onclick="exportData()">📥 导出</button>
            <button class="btn btn-warning" onclick="importData()">📤 导入</button>
            <button class="btn btn-secondary" onclick="forceSync()">🔄 手动同步</button>
        </div>
        <div class="table-container">
            <table><thead><tr><th style="width:40px"></th><th>货号</th><th>规格统计</th><th>总库存</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ Gitee 云同步配置</h3>
            <p>使用 Gitee Gist 实现免费云同步<br>
            <small>👉 <a href="https://gitee.com/profile/personal_access_tokens" target="_blank">点我生成 Token</a> (需勾选 gists 权限)</small></p>
            <div class="form-group">
                <label>Gitee Personal Token</label>
                <input type="password" id="settingToken" placeholder="粘贴你的 Token">
                <div class="help-text">Token 仅保存在本地浏览器，安全可控</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置管理 ==========
        const GIST_FILE = 'shoe_inventory.json';
        let config = JSON.parse(localStorage.getItem('giteeConfig')) || {};
        let products = JSON.parse(localStorage.getItem('shoeInventory')) || [];
        let isSyncing = false;

        // ========== 云端同步函数 ==========
        async function syncToCloud() {
            if (!config.token) return;
            isSyncing = true;
            updateSyncUI('同步中...', 'waiting');
            
            try {
                // 先尝试获取现有 Gist
                let gistId = config.gistId;
                if (!gistId) {
                    // 创建新 Gist
                    const createRes = await fetch(`https://gitee.com/api/v5/gists?access_token=${config.token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            description: '鞋子库存数据',
                            public: false,
                            files: { [GIST_FILE]: { content: JSON.stringify({ products, lastSync: new Date().toISOString() }) } }
                        })
                    });
                    
                    if (!createRes.ok) throw new Error('创建失败');
                    const createData = await createRes.json();
                    gistId = createData.id;
                    config.gistId = gistId;
                    localStorage.setItem('giteeConfig', JSON.stringify(config));
                } else {
                    // 更新现有 Gist
                    const updateRes = await fetch(`https://gitee.com/api/v5/gists/${gistId}?access_token=${config.token}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            files: { [GIST_FILE]: { content: JSON.stringify({ products, lastSync: new Date().toISOString() }) } }
                        })
                    });
                    
                    if (!updateRes.ok) throw new Error('更新失败');
                }
                
                updateSyncUI('已同步云端', 'success');
            } catch (e) {
                console.error('同步失败:', e);
                updateSyncUI('同步失败', 'error');
                showToast('云端同步失败：' + e.message, 'error');
            }
            isSyncing = false;
        }

        async function loadFromCloud() {
            if (!config.token || !config.gistId) return false;
            
            try {
                const res = await fetch(`https://gitee.com/api/v5/gists/${config.gistId}?access_token=${config.token}`);
                if (!res.ok) throw new Error('加载失败');
                
                const data = await res.json();
                const content = JSON.parse(data.files[GIST_FILE].content);
                
                if (content.products) {
                    products = content.products;
                    localStorage.setItem('shoeInventory', JSON.stringify(products));
                    updateSyncUI('已同步云端', 'success');
                    return true;
                }
            } catch (e) {
                console.error('加载失败:', e);
                updateSyncUI('加载失败', 'error');
            }
            return false;
        }

        function updateSyncUI(text, type) {
            const dot = document.getElementById('syncDot');
            const txt = document.getElementById('syncText');
            txt.textContent = text;
            dot.className = 'sync-dot' + (type === 'error' ? ' error' : type === 'waiting' ? ' waiting' : '');
        }

        function saveConfig() {
            const token = document.getElementById('settingToken').value.trim();
            if (!token) return showToast('请输入 Token', 'error');
            
            config = { token, gistId: null };
            localStorage.setItem('giteeConfig', JSON.stringify(config));
            closeSettings();
            showToast('配置保存成功！正在创建云端存储...', 'success');
            
            setTimeout(() => {
                syncToCloud().then(() => {
                    renderTable();
                    updateStats();
                });
            }, 500);
        }

        function openSettings() {
            document.getElementById('settingToken').value = config.token || '';
            document.getElementById('settingsModal').classList.add('active');
        }
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // ========== 业务逻辑 ==========
        function addProduct() {
            const id = document.getElementById('productId').value.trim();
            const color = document.getElementById('productColor').value.trim();
            const size = document.getElementById('productSize').value;
            const qty = parseInt(document.getElementById('productQuantity').value) || 0;

            if (!id || !color || !size) return showToast('请填写完整信息', 'error');

            const existing = products.find(p => p.id === id && p.color === color && p.size === size);
            if (existing) {
                existing.quantity += qty;
                showToast('库存已追加', 'success');
            } else {
                products.push({ id, color, size, quantity: qty, updatedAt: new Date().toLocaleString() });
                showToast('添加成功', 'success');
            }

            localStorage.setItem('shoeInventory', JSON.stringify(products));
            renderTable();
            updateStats();
            syncToCloud();
            resetForm();
        }

        function resetForm() {
            ['productId', 'productColor', 'productSize', 'productQuantity'].forEach(id => document.getElementById(id).value = '');
        }

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const fColor = document.getElementById('filterColor').value;
            const fSize = document.getElementById('filterSize').value;
            const tbody = document.getElementById('tableBody');

            let filtered = products.filter(p => 
                p.id.toLowerCase().includes(search) && 
                (!fColor || p.color === fColor) && 
                (!fSize || p.size === fSize)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">📭 暂无数据</div></td></tr>';
                return;
            }

            const groups = new Map();
            filtered.forEach(p => {
                if (!groups.has(p.id)) groups.set(p.id, { id: p.id, variants: [], total: 0 });
                groups.get(p.id).variants.push(p);
                groups.get(p.id).total += p.quantity;
            });

            let html = '';
            groups.forEach(g => {
                const colors = [...new Set(g.variants.map(v => v.color))];
                const sizes = [...new Set(g.variants.map(v => v.size))];
                
                html += `
                    <tr class="main-row" onclick="toggleRow('${g.id}')">
                        <td><span class="toggle-icon" id="icon-${g.id}">▶</span></td>
                        <td><span class="product-id">${g.id}</span></td>
                        <td>${colors.length}色 / ${sizes.length}码</td>
                        <td><strong>${g.total}</strong></td>
                        <td><button class="btn btn-primary btn-sm" onclick="event.stopPropagation()">编辑</button></td>
                    </tr>
                    <tr id="detail-${g.id}" style="display:none">
                        <td colspan="5">
                            <table style="width:100%">
                                ${g.variants.map(v => `
                                    <tr>
                                        <td><span class="color-badge" style="background:${getColorCode(v.color)}">${v.color}</span></td>
                                        <td>${v.size}码</td>
                                        <td><span class="quantity-badge ${getQtyClass(v.quantity)}">${v.quantity}双</span></td>
                                        <td>${v.updatedAt}</td>
                                    </tr>
                                `).join('')}
                            </table>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function toggleRow(id) {
            const row = document.getElementById(`detail-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            if (row.style.display === 'none') {
                row.style.display = '';
                icon.classList.add('expanded');
            } else {
                row.style.display = 'none';
                icon.classList.remove('expanded');
            }
        }

        function getColorCode(color) {
            const map = { '黑色': '#2c3e50', '白色': '#95a5a6', '红色': '#e74c3c', '蓝色': '#3498db', '绿色': '#27ae60' };
            return map[color] || '#7f8c8d';
        }

        function getQtyClass(q) {
            return q >= 50 ? 'quantity-high' : q >= 10 ? 'quantity-medium' : 'quantity-low';
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = new Set(products.map(p => p.id)).size;
            document.getElementById('totalQuantity').textContent = products.reduce((sum, p) => sum + p.quantity, 0);
            document.getElementById('totalColors').textContent = new Set(products.map(p => p.color)).size;
            document.getElementById('lowStock').textContent = products.filter(p => p.quantity < 10).length;
            
            // 更新筛选器
            const colors = [...new Set(products.map(p => p.color))];
            const sizes = [...new Set(products.map(p => p.size))];
            
            const colorSelect = document.getElementById('filterColor');
            colorSelect.innerHTML = '<option value="">全部颜色</option>' + 
                colors.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const sizeSelect = document.getElementById('filterSize');
            sizeSelect.innerHTML = '<option value="">全部尺码</option>' + 
                sizes.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `库存_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            showToast('导出成功', 'success');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            products = data;
                            localStorage.setItem('shoeInventory', JSON.stringify(products));
                            renderTable();
                            updateStats();
                            syncToCloud();
                            showToast('导入成功', 'success');
                        }
                    } catch {
                        showToast('文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function forceSync() {
            if (!config.token) return showToast('请先配置 Token', 'warning');
            syncToCloud();
        }

        function showToast(msg, type = 'success') {
            const container = document.querySelector('.toast-container') || (() => {
                const div = document.createElement('div');
                div.className = 'toast-container';
                document.body.appendChild(div);
                return div;
            })();
            
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        window.onload = () => {
            renderTable();
            updateStats();
            if (config.token && config.gistId) {
                loadFromCloud();
            } else if (config.token) {
                syncToCloud();
            }
        };
    </script>
</body>
</html>
